spring:
    application:
        name: oasis-hotels-api

    datasource:
        url: jdbc:mysql://localhost:3308/oasis_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        username: root
        password: root
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                "format_sql": true

server:
    port: 8001